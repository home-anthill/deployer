# network policy configuration
serviceAccounts:
  # Set to false to skip creating ServiceAccount resources and binding them to pods
  enabled: true

network:
  # Set to false to skip deploying all NetworkPolicy resources (useful for dev/test clusters)
  enabled: true
  # Namespace where NGINX Gateway Fabric data-plane pods run
  nginxGatewayNamespace: "nginx-gateway"
  # Namespace where RabbitMQ Kubernetes Operator runs
  rabbitmqOperatorNamespace: "rabbitmq-system"
  # CIDR covering all Kubernetes node IPs — allows kubelet health-probe traffic.
  # Restrict to your actual node IP range in production (e.g. "10.0.0.0/24").
  nodesCIDR: "10.0.0.0/8"

# debug configuration, not for production environment
debug:
  pods:
    alwaysPullContainers: true
    # if your pods are crashing, you can enable this to prevent restarts
    # and to access them using your terminal.
    # Don't enable this on a production environment!!!
    sleepInfinity: false