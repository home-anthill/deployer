# Default values for home-anthill.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
namespace: home-anthill
domainName: "your-domain.com"

domains:
  http: 
    name: "your-domain.com"
    publicIp: "1.2.3.4"
    ssl:
      enable: false
      
  mqtt: 
    name: "mqtt-domain.com"
    publicIp: "9.8.7.6"
    ssl:
      enable: false

letsencrypt:
  email: "your.email@emailexample.com"
  server:
    env: "prod"
    path: "https://acme-v02.api.letsencrypt.org/directory"
  # server:
  #   # attention: if you want to use staging server, you should update CA cert in sensors and devices firmwares,
  #   # because firmwares have the let's encrypt rootCA, but for staging you should use the public cert as CA 
  #   env: "staging"
  #   path: "https://acme-staging-v02.api.letsencrypt.org/directory"

# dhi.io hardened image registry credentials
# ATTENTION: you must use your Dockerhub credentials here
dhi:
  enabled: true
  username: "your-dockerhub-username"
  password: "your-dockerhub-password"

# alpine image
alpine:
  image: "alpine"
  # hardened base images from dhi.io (used only if dhi.enabled is true)
  hardenedImage: "dhi.io/alpine-base:3.23"
  # Resources for init-certs init containers that use this image
  resources:
    requests:
      cpu: "5m"
      memory: "16Mi"
    limits:
      cpu: "50m"
      memory: "32Mi"

# nginx image
nginx:
  image: "1-alpine"
  # hardened base images from dhi.io (used only if dhi.enabled is true)
  hardenedImage: "dhi.io/nginx:1-alpine3.23-dev"

# k8s-config-reloader
k8sConfigReloader:
  image: "ks89/k8s-config-reloader:develop"
  resources:
    requests:
      cpu: "5m"
      memory: "16Mi"
    limits:
      cpu: "50m"
      memory: "32Mi"

# public MQTT server
mosquitto:
  image: "ks89/mosquitto:develop"
  serviceName: "mosquitto-svc"
  dataFolder: "/root/mosquitto-persistence-data"
  auth:
    enable: true
    username: "mosquser"
    password: "Password1!" # default value, please replace this with your custom values file
  resources:
    requests:
      cpu: "5m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "128Mi"

# internal redis server
redis:
  image: "redis:8"
  # hardened base images from dhi.io (used only if dhi.enabled is true)
  # compat exists specifically to bridge the gap between "fully hardened" and "needs a shell".
  # For example, when Redis health check needs redis-cli ping via a shell script.
  hardenedImage: "dhi.io/redis:8-compat"
  serviceName: "redis-svc"
  dataFolder: "/root/redis-data"
  username: "redisuser"
  password: "your-redis-password" # default value, please replace this with your custom values file
  resources:
    requests:
      cpu: "5m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# internal rabbitmq server
rabbitmq:
  image: "rabbitmq:4.2.4-management"
  # serviceName is by default 'rabbitmq'
  # use only alphanumerical passwords for rabbitmq (no special characters)
  user: "rabbitadmin"
  password: "rabbitadminpassword" # default value, please replace this with your custom values file
  producer:
    user: "produceruser"
    password: "producerpassword"  # default value, please replace this with your custom values file
  consumer:
    user: "consumeruser"
    password: "consumerpassword"  # default value, please replace this with your custom values file
  amqpHmacSecret: "supersecrehmac"  # default value, please replace this with your custom values file
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# external mongodb service (for instance Atlas Cloud MongoDB)
mongodbUrl: "mongodb+srv://user:password@cluster0.1234.mongodb.net" # <-- update this with your MongoDB URL, for instance from Atlas Cloud MongoDB

# web app
gui:
  image: "ks89/gui:develop"
  serviceName: "gui-svc"
  resources:
    requests:
      cpu: "5m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

admission:
  image: "ks89/admission:develop"
  serviceName: admission-svc
  nginxServiceName: admission-nginx-svc
  grpc: 
    libraryLogEnable: false
  resources:
    requests:
      cpu: "5m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "128Mi"
  # Resources for the admission-nginx sidecar container
  nginxResources:
    requests:
      cpu: "5m"
      memory: "32Mi"
    limits:
      cpu: "200m"
      memory: "64Mi"

apiDevices:
  image: "ks89/api-devices:develop"
  serviceName: api-devices-svc
  grpc: 
    libraryLogEnable: false
  resources:
    requests:
      cpu: "5m"
      memory: "64Mi"
    limits:
