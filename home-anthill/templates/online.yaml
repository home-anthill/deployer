---
apiVersion: v1
kind: ConfigMap
metadata:
  name: online-config
  namespace: {{ .Values.namespace }}
data:
  .env: |-
    LOG_LEVEL=info
    REDIS_URI=redis://{{ .Values.redis.serviceName }}.{{ .Values.namespace }}.svc.cluster.local:6379
    REDIS_USERNAME={{ .Values.redis.username }}
    REDIS_PASSWORD={{ .Values.redis.password }}
  Rocket.toml: |-
    [default]

    [release]
    address = "0.0.0.0"
    port = 80
    secret_key="{{ .Values.online.rocketSecretKey.release }}"
    limits = { json = "8 KiB" }
    cli_colors = false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: online
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: online
  template:
    metadata:
      labels:
        app: online
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: online
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: online
        image: {{ .Values.online.image }}
        {{- if .Values.debug.pods.alwaysPullContainers }}
        imagePullPolicy: Always
        {{- end }}
        {{- if .Values.debug.pods.sleepInfinity }}
        command: ["/bin/sh"]
        args: ["-c", "chmod +x /app/online; /app/online; sleep Infinity;"]
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
        resources:
          {{- toYaml .Values.online.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 60
          failureThreshold: 2
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: online-config
          mountPath: /app/.env
          subPath: .env
          readOnly: true
        - name: online-config
          mountPath: /app/Rocket.toml
          subPath: Rocket.toml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: online-config
        configMap:
          name: online-config
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.online.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: online
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http