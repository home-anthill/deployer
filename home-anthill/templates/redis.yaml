---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Values.namespace }}
data:
  redis.conf: |-
    # Disable RDB snapshots — Redis is used as a cache, persistence is not needed.
    # This avoids MISCONF errors when the hostPath volume is not writable.
    save ""
    protected-mode no
    bind 0.0.0.0
    user {{ .Values.redis.username }} on >{{ .Values.redis.password }} ~* +@all
    user default off
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: redis
      automountServiceAccountToken: false
      {{- end }}
      {{- if .Values.dhi.enabled }}
      imagePullSecrets:
        - name: dhi-registry-secret
      {{- end }}
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: {{ if .Values.dhi.enabled }}{{ .Values.redis.hardenedImage }}{{ else }}{{ .Values.redis.image }}{{ end }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        readinessProbe:
          exec:
            command:
            - redis-cli
            - --user
            - {{ .Values.redis.username }}
            - -a
            - {{ .Values.redis.password }}
            - --no-auth-warning
            - ping
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - redis-cli
            - --user
            - {{ .Values.redis.username }}
            - -a
            - {{ .Values.redis.password }}
            - --no-auth-warning
            - ping
          periodSeconds: 60
        # start redis with a custom redis.conf file
        command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
        ports:
        - name: "redis-port"
          containerPort: 6379
          protocol: TCP
        volumeMounts:
          - name: data
            mountPath: "/data"
          - name: redis-config
            mountPath: /usr/local/etc/redis/redis.conf
            subPath: redis.conf
            readOnly: true
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data-claim
        - name: redis-config
          configMap:
            name: redis-config
        - name: tmp
          emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.redis.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: redis
  ports:
    - name: redis-port
      protocol: TCP
      port: 6379
      targetPort: redis-port