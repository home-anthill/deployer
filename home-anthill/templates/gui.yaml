---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gui-config
  namespace: {{ .Values.namespace }}
data:
  # nginx.conf used by the static web app
  # with proxy_pass to api server
  nginx.conf: |-
    worker_processes auto;
    events {
        worker_connections 1024;
    }

    http {
      server_tokens off;
      # IMPORTANT: mime.types are required, otherwise react app
      # won't load SVGs and CSS files in the right way
      include /etc/nginx/mime.types;

      client_max_body_size 10m;

      server {
        listen 80;
        listen  [::]:80;
        {{- if .Values.domains.http.name }}
        server_name  {{ .Values.domains.http.name }} www.{{ .Values.domains.http.name }};
        {{- end }}

        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "child-src 'none'; connect-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; default-src 'none'; font-src 'self' https://*.gstatic.com/; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data: https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.gstatic.com/ https://*.githubusercontent.com/; manifest-src 'self'; media-src 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://*.googleapis.com/; worker-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; base-uri 'self'" always;

        # Dedicated health-probe endpoint — exact match suppresses access log noise.
        location = /keepalive {
          access_log off;
          return 200 'ok';
          add_header Content-Type text/plain;
        }

        location / {
          root /etc/nginx/html/html;
          index  index.html index.htm;
          try_files $uri $uri/ /index.html;
        }

        location /api {
          proxy_pass http://{{ .Values.apiServer.serviceName }}.{{ .Values.namespace }}.svc.cluster.local:80;
          proxy_set_header X-Forwarded-For $remote_addr;
          proxy_set_header Host            $http_host;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gui
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gui
  template:
    metadata:
      labels:
        app: gui
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: gui
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: gui
        image: {{ .Values.gui.image }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.gui.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 60
          failureThreshold: 2
        ports:
          # always enabled to redirect to https
          - name: http
            containerPort: 80
            protocol: TCP
        volumeMounts:
          - name: gui-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
            readOnly: true
          - name: nginx-cache
            mountPath: /var/cache/nginx
          - name: nginx-run
            mountPath: /run
          - name: nginx-tmp
            mountPath: /tmp
          - name: nginx-log
            mountPath: /var/log/nginx
      volumes:
        - name: gui-config
          configMap:
            name: gui-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.gui.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: gui
  ports:
    # always enabled to redirect to https and for certbot
    - name: http
      protocol: TCP
      port: 80
      targetPort: http