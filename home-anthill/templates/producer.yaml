---
apiVersion: v1
kind: ConfigMap
metadata:
  name: producer-config
  namespace: {{ .Values.namespace }}
data:
  .env: |-
    LOG_LEVEL=info
    AMQP_URI=amqp://{{ .Values.rabbitmq.producer.user }}:{{ .Values.rabbitmq.producer.password }}@rabbitmq.{{ .Values.namespace }}.svc.cluster.local:5672
    AMQP_HMAC_SECRET={{ .Values.rabbitmq.amqpHmacSecret }}
    AMQP_QUEUE_NAME=ks89
    MQTT_URL={{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local
    MQTT_PORT=1883
    MQTT_TLS=false
    ROOT_CA=
    MQTT_CERT_FILE=
    MQTT_KEY_FILE=
    MQTT_CLIENT_ID=producer
    {{- if .Values.mosquitto.auth.enable }}
    MQTT_AUTH=true
    MQTT_USER={{ .Values.mosquitto.auth.username }}
    MQTT_PASSWORD={{ .Values.mosquitto.auth.password }}
    {{ else }}
    MQTT_AUTH=false
    MQTT_USER=
    MQTT_PASSWORD=
    {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: producer
      automountServiceAccountToken: false
      {{- end }}
      {{- if .Values.dhi.enabled }}
      imagePullSecrets:
        - name: dhi-registry-secret
      {{- end }}
      {{- if .Values.domains.mqtt.ssl.enable }}
      initContainers:
        - name: wait-for-mqtt
          image: {{ if .Values.dhi.enabled }}{{ .Values.alpine.hardenedImage }}{{ else }}{{ .Values.alpine.image }}{{ end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.alpine.resources | nindent 12 }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              until nc -z {{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local 1883; do
                echo "Waiting for Mosquitto on port 1883..."; sleep 2
              done
      {{- end }}
      containers:
      - name: producer
        image: {{ .Values.producer.image }}
        {{- if .Values.debug.pods.alwaysPullContainers }}
        imagePullPolicy: Always
        {{- end }}
        {{- if .Values.debug.pods.sleepInfinity }}
        command: ["/bin/sh"]
        args: ["-c", "chmod +x /app/producer; /app/producer; sleep Infinity;"]
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.producer.resources | nindent 10 }}
        ports:
        - name: mqtt
          containerPort: 1883
          protocol: TCP
        volumeMounts:
          - name: producer-config
            mountPath: /app/.env
            subPath: .env
            readOnly: true
      volumes:
        - name: producer-config
          configMap:
            name: producer-config
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.producer.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: producer
  ports:
    - name: mqtt
      protocol: TCP
      port: 1883
      targetPort: mqtt
