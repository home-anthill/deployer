---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: {{ .Values.namespace }}
data:
  mosquitto.conf: |-
    persistence true
    persistence_location /mosquitto/data
    allow_anonymous {{ if .Values.mosquitto.auth.enable }}false{{ else }}true{{ end }}
    connection_messages true
    log_type all

    {{- if .Values.domains.mqtt.ssl.enable }}
    # Internal listener (plain TCP) for in-cluster services — avoids hairpin routing
    listener 1883
    # External listener (TLS) for IoT devices (ESP32) routed via Gateway
    listener 8883
    # I need to copy let's encrypt files to another destination to be able
    # to set right owner and permissions
    certfile /etc/mosquitto/certs/tls.crt
    {{- if eq "prod" .Values.letsencrypt.server.env  }}
    cafile /etc/ssl/certs/ca-certificates.crt
    {{- end }}
    keyfile /etc/mosquitto/certs/tls.key
    {{- else }}
    listener 1883
    {{- end }}

    {{- if .Values.mosquitto.auth.enable }}
    password_file /mosquitto/passwd/password_file
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: mosquitto
      automountServiceAccountToken: false
      {{- end }}
      {{- if .Values.dhi.enabled }}
      imagePullSecrets:
        - name: dhi-registry-secret
      {{- end }}
      securityContext:
        # The owner for volumes and any files created in that volume will be Group ID 1883 (mosquitto)
        fsGroup: 1883
        runAsUser: 1883
        runAsGroup: 1883
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      shareProcessNamespace: true # to be able to restart mosquitto via k8s-config-reloader
      {{- if .Values.domains.mqtt.ssl.enable }}
      initContainers:
      - name: wait-for-cert
        image: {{ if .Values.dhi.enabled }}{{ .Values.alpine.hardenedImage }}{{ else }}{{ .Values.alpine.image }}{{ end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.alpine.resources | nindent 10 }}
        command:
          - "/bin/sh"
          - "-c"
          - |
            until [ -f /etc/mosquitto/certs/tls.crt ] && [ -f /etc/mosquitto/certs/tls.key ]; do
              echo "Waiting for mqtt-tls secret to be issued by cert-manager..."; sleep 5
            done
            echo "TLS cert found, starting Mosquitto."
        volumeMounts:
          - name: certmqtt
            mountPath: /etc/mosquitto/certs/
      {{- end }}
      containers:
      - name: mosquitto
        image: {{ .Values.mosquitto.image }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.mosquitto.resources | nindent 10 }}
        readinessProbe:
          exec:
            command:
            - mosquitto_pub
            - -h
            - localhost
            - -p
            - "1883"
            - -u
            - "{{ .Values.mosquitto.auth.username }}"
            - -P
            - "{{ .Values.mosquitto.auth.password }}"
            - -m
            - "readiness_probe"
            - -t
            - readiness
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - mosquitto_pub
            - -h
            - localhost
            - -p
            - "1883"
            - -u
            - "{{ .Values.mosquitto.auth.username }}"
            - -P
            - "{{ .Values.mosquitto.auth.password }}"
            - -m
            - "readiness_probe"
            - -t
            - readiness
          periodSeconds: 60
        env:
        {{ if .Values.domains.mqtt.ssl.enable }}
        - name: MOSQUITTO_SSL_ENABLE
          value: "true"
        {{- end }}
        {{- if .Values.mosquitto.auth.enable }}
        - name: MOSQUITTO_USERNAME
          value: {{ .Values.mosquitto.auth.username }}
        - name: MOSQUITTO_PASSWORD
          value: {{ .Values.mosquitto.auth.password }}
        {{- end }}
        ports:
        {{- if .Values.domains.mqtt.ssl.enable }}
        - name: mqtt
          containerPort: 1883
          protocol: TCP
        - name: mqtts
          containerPort: 8883
          protocol: TCP
        {{- else }}
        - name: mqtt
          containerPort: 1883
          protocol: TCP
        {{- end }}
        volumeMounts:
          - name: data
            mountPath: "/mosquitto/data"
          - name: mosquitto-config
            mountPath: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true
          - name: passwd
            mountPath: /mosquitto/passwd
          - name: tmp
            mountPath: /tmp
          {{- if .Values.domains.mqtt.ssl.enable }}
          - name: certmqtt
            mountPath: /etc/mosquitto/certs/
          {{- end }}
      {{- if .Values.domains.mqtt.ssl.enable }}
      - name: k8s-config-reloader
        image: {{ .Values.k8sConfigReloader.image }}
        env:
          - name: CONFIG_DIR
            value: /etc/mosquitto/certs/
          - name: PROCESS_NAME
            value: mosquitto
        resources:
          {{- toYaml .Values.k8sConfigReloader.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - KILL
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
          - mountPath: /config/
            name: mosquitto-config
            readOnly: true
          - name: certmqtt
            mountPath: /etc/mosquitto/certs/
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data-claim
        - name: mosquitto-config
          configMap:
            name: mosquitto-config
        - name: passwd
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.domains.mqtt.ssl.enable }}
        - name: certmqtt
          secret:
            secretName: mqtt-tls
            defaultMode: 0600
            optional: true
        {{- end }}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.mosquitto.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: mosquitto
  ports:
    {{- if .Values.domains.mqtt.ssl.enable }}
    - name: mqtt
      protocol: TCP
      port: 1883
      targetPort: mqtt
    - name: mqtts
      protocol: TCP
      port: 8883
      targetPort: mqtts
    {{- else }}
    - name: mqtt
      protocol: TCP
      port: 1883
      targetPort: mqtt
    {{- end }}