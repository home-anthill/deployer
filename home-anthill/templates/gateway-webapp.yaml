---
# Gateway for HTTP and HTTPS web application traffic.
# NGINX Gateway Fabric creates a LoadBalancer Service for this Gateway;
# the MetalLB annotation pins it to the configured public IP.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: webapp-gateway
  namespace: {{ .Values.namespace }}
spec:
  gatewayClassName: nginx
  # infrastructure.annotations are propagated by NGF to the LoadBalancer Service,
  # allowing MetalLB to assign the specific public IP.
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: {{ .Values.domains.http.publicIp | quote }}
  listeners:
  - name: http
    port: 80
    protocol: HTTP
  {{- if .Values.domains.http.ssl.enable }}
  - name: https
    port: 443
    protocol: HTTPS
    hostname: {{ .Values.domains.http.name | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: webapp-tls
  - name: https-www
    port: 443
    protocol: HTTPS
    hostname: {{ printf "www.%s" .Values.domains.http.name | quote }}
    tls:
      mode: Terminate
      certificateRefs:
      - name: webapp-tls
  {{- end }}
{{- if .Values.domains.http.ssl.enable }}
---
# Redirect all HTTP requests to HTTPS (301).
# Replaces: nginx.ingress.kubernetes.io/ssl-redirect and force-ssl-redirect annotations.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webapp-http-redirect
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: webapp-gateway
    sectionName: http
  hostnames:
  - {{ .Values.domains.http.name | quote }}
  - {{ printf "www.%s" .Values.domains.http.name | quote }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
# Route HTTPS traffic:
#   /admission  → admission-nginx-svc (NGINX sidecar proxy for the admission gRPC service)
#   /           → gui-svc
# Security response headers replace the nginx configuration-snippet annotation.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webapp-https-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: webapp-gateway
    sectionName: https
  - name: webapp-gateway
    sectionName: https-www
  hostnames:
  - {{ .Values.domains.http.name | quote }}
  - {{ printf "www.%s" .Values.domains.http.name | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /admission
    backendRefs:
    - name: {{ .Values.admission.nginxServiceName }}
      port: 80
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains"
        - name: X-Frame-Options
          value: "sameorigin"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: Referrer-Policy
          value: "same-origin"
        - name: Permissions-Policy
          value: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
        - name: Content-Security-Policy
          value: "child-src 'none'; connect-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; default-src 'none'; font-src 'self' https://*.gstatic.com/; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data: https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.gstatic.com/ https://*.githubusercontent.com/; manifest-src 'self'; media-src 'none'; object-src 'none'; sandbox allow-forms allow-scripts allow-same-origin allow-popups; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://*.googleapis.com/; worker-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; base-uri 'self'; require-trusted-types-for 'script'"
    - type: ExtensionRef
      extensionRef:
        group: gateway.nginx.org
        kind: SnippetsFilter
        name: webapp-rate-limit
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.gui.serviceName }}
      port: 80
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        set:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains"
        - name: X-Frame-Options
          value: "sameorigin"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: Referrer-Policy
          value: "same-origin"
        - name: Permissions-Policy
          value: "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
        - name: Content-Security-Policy
          value: "child-src 'none'; connect-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; default-src 'none'; font-src 'self' https://*.gstatic.com/; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data: https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.gstatic.com/ https://*.githubusercontent.com/; manifest-src 'self'; media-src 'none'; object-src 'none'; sandbox allow-forms allow-scripts allow-same-origin allow-popups; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://*.googleapis.com/; worker-src 'self' https://*.google.com/ https://*.googleusercontent.com/ https://*.fbsbx.com/ https://*.googleapis.com/ https://*.gstatic.com/; base-uri 'self'; require-trusted-types-for 'script'"
    - type: ExtensionRef
      extensionRef:
        group: gateway.nginx.org
        kind: SnippetsFilter
        name: webapp-rate-limit
{{- else }}
---
# Plain HTTP routing (SSL disabled): /admission → admission-nginx-svc, / → gui-svc
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: webapp-http-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: webapp-gateway
    sectionName: http
  hostnames:
  - {{ .Values.domains.http.name | quote }}
  - {{ printf "www.%s" .Values.domains.http.name | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /admission
    backendRefs:
    - name: {{ .Values.admission.nginxServiceName }}
