---
# NGF ClientSettingsPolicy: enforce a 100 MiB max request body on the webapp Gateway
# and a minimum TLS 1.2 requirement with a modern cipher list.
# Replaces: nginx.ingress.kubernetes.io/proxy-body-size and client-max-body-size annotations.
# Note: the tls block only takes effect when the Gateway has HTTPS listeners
# (i.e. domains.http.ssl.enable: true). It is harmless when SSL is disabled.
apiVersion: gateway.nginx.org/v1alpha1
kind: ClientSettingsPolicy
metadata:
  name: webapp-client-settings
  namespace: {{ .Values.namespace }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: webapp-gateway
  body:
    maxSize: "100m"
  {{- if .Values.domains.http.ssl.enable }}
  # tls.minVersion requires NGF >= 1.4.0 — uncomment once your cluster is on a supported version
  # tls:
  #   minVersion: "TLSv1.2"
  #   ciphers:
  #     - "TLS_AES_128_GCM_SHA256"
  #     - "TLS_AES_256_GCM_SHA384"
  #     - "TLS_CHACHA20_POLY1305_SHA256"
  #     - "ECDHE-ECDSA-AES128-GCM-SHA256"
  #     - "ECDHE-RSA-AES128-GCM-SHA256"
  #     - "ECDHE-ECDSA-AES256-GCM-SHA384"
  #     - "ECDHE-RSA-AES256-GCM-SHA384"
  #     - "ECDHE-ECDSA-CHACHA20-POLY1305"
  #     - "ECDHE-RSA-CHACHA20-POLY1305"
  {{- end }}
---
# NGF SnippetsFilter: rate limit to 100 req/s per IP with a burst of 20.
# Replaces: nginx.ingress.kubernetes.io/limit-rps annotation.
#
# IMPORTANT – SnippetsFilter is an alpha feature in NGINX Gateway Fabric.
# Enable it when installing NGF:
#   helm install nginx-gateway-fabric nginx-stable/nginx-gateway-fabric \
#     --set nginxGateway.snippetsFilters.enable=true
#
# The "http" context snippet is deduplicated by NGF (included once per nginx config
# even though this filter is referenced by multiple HTTPRoute rules above).
apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsFilter
metadata:
  name: webapp-rate-limit
  namespace: {{ .Values.namespace }}
spec:
  snippets:
  - context: http
    value: "limit_req_zone $binary_remote_addr zone=webapp_per_ip:10m rate=100r/s;"
  - context: http.server.location
    value: "limit_req zone=webapp_per_ip burst=20 nodelay;"
{{- if .Values.domains.http.ssl.enable }}
---
# Explicit Certificate for webapp TLS.
# The cert-manager.io/issuer Gateway annotation (gateway shim) is intentionally
# NOT used here because it injects a second parentRef into the challenge HTTPRoute,
# causing a "sectionName or port must be unique" validation error.
# An explicit Certificate avoids the shim entirely, matching the MQTT pattern.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webapp-tls
  namespace: {{ .Values.namespace }}
spec:
  secretName: webapp-tls
  issuerRef:
    name: cert-issuer-webapp
    kind: Issuer
  dnsNames:
  - {{ .Values.domains.http.name | quote }}
  - {{ printf "www.%s" .Values.domains.http.name | quote }}
---
# cert-manager Issuer for the webapp TLS certificate (Let's Encrypt).
# Uses Gateway API http01 solver instead of the legacy Ingress-based solver.
# Requires cert-manager >= 1.15 (Gateway API support is enabled by default).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-issuer-webapp
  namespace: {{ .Values.namespace }}
spec:
  acme:
    server: {{ .Values.letsencrypt.server.path }}
    email: {{ .Values.letsencrypt.email }}
    privateKeySecretRef:
      name: cert-issuer-webapp
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - name: webapp-gateway
            namespace: {{ .Values.namespace }}
            kind: Gateway
            sectionName: http
{{- end }}
