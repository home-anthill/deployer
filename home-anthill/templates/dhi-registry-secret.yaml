{{- if .Values.dhi.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dhi-registry-secret
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ dict "auths" (dict "dhi.io" (dict "username" .Values.dhi.username "password" .Values.dhi.password "auth" (printf "%s:%s" .Values.dhi.username .Values.dhi.password | b64enc))) | toJson | b64enc }}
{{- end }}
