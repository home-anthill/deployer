---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-devices-config
  namespace: {{ .Values.namespace }}
data:
  .env: |-
    LOG_FOLDER=./logs/
    MONGODB_URL={{ .Values.mongodbUrl }}
    MQTT_URL=mqtt://{{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local
    MQTT_PORT=1883
    MQTT_TLS=false
    MQTT_CA_FILE=
    MQTT_CERT_FILE=
    MQTT_KEY_FILE=
    MQTT_CLIENT_ID=apiDevices
    {{- if .Values.mosquitto.auth.enable }}
    MQTT_AUTH=true
    MQTT_USER={{ .Values.mosquitto.auth.username }}
    MQTT_PASSWORD={{ .Values.mosquitto.auth.password }}
    {{ else }}
    MQTT_AUTH=false
    MQTT_USER=
    MQTT_PASSWORD=
    {{ end -}}
    GRPC_URL=0.0.0.0:50051
    GRPC_TLS=false
    CERT_FOLDER_PATH=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-devices
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api-devices
  template:
    metadata:
      labels:
        app: api-devices
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: api-devices
      automountServiceAccountToken: false
      {{- end }}
      {{- if .Values.dhi.enabled }}
      imagePullSecrets:
        - name: dhi-registry-secret
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.domains.mqtt.ssl.enable }}
      initContainers:
        - name: wait-for-mqtt
          image: {{ if .Values.dhi.enabled }}{{ .Values.alpine.hardenedImage }}{{ else }}{{ .Values.alpine.image }}{{ end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.alpine.resources | nindent 12 }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              until nc -z {{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local 1883; do
                echo "Waiting for Mosquitto on port 1883..."; sleep 2
              done
      {{- end }}
      containers:
      - name: api-devices
        image: {{ .Values.apiDevices.image }}
        imagePullPolicy: Always
        workingDir: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          {{- toYaml .Values.apiDevices.resources | nindent 10 }}
        readinessProbe:
          grpc:
            port: 50051
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 50051
          periodSeconds: 10
        env:
        - name: ENV
          value: "prod"
        {{- if .Values.apiDevices.grpc.libraryLogEnable }}
        - name: GRPC_GO_LOG_SEVERITY_LEVEL
          value: "info"
        - name: GRPC_GO_LOG_VERBOSITY_LEVEL
          value: "2"
        {{- end }}
        ports:
        - name: grpc
          containerPort: 50051
          protocol: TCP
        volumeMounts:
          - name: api-devices-config
            mountPath: /tmp/.env
            subPath: .env
            readOnly: true
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: api-devices-config
          configMap:
            name: api-devices-config
        - name: tmp
          emptyDir: {}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.apiDevices.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: api-devices
  ports:
  - name: grpc
    protocol: TCP
    port: 50051
    targetPort: grpc