{{- if .Values.serviceAccounts.enabled }}
# Dedicated ServiceAccount per workload — principle of least privilege.
# Each pod gets its own identity; all have automountServiceAccountToken disabled
# because none of these services need API-server access.
{{- $ns := .Values.namespace }}
{{- $services := list "gui" "api-server" "api-devices" "admission" "admission-nginx" "register" "online" "online-receiver" "online-alarm" "producer" "consumer" "mosquitto" "redis" }}
{{- range $services }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ . }}
  namespace: {{ $ns }}
  labels:
    app: {{ . }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
