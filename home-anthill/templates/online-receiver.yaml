---
apiVersion: v1
kind: ConfigMap
metadata:
  name: online-receiver-config
  namespace: {{ .Values.namespace }}
data:
  .env: |-
    LOG_LEVEL=info
    REDIS_URI=redis://{{ .Values.redis.serviceName }}.{{ .Values.namespace }}.svc.cluster.local:6379
    REDIS_USERNAME={{ .Values.redis.username }}
    REDIS_PASSWORD={{ .Values.redis.password }}
    MQTT_URL={{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local
    MQTT_PORT=1883
    MQTT_TLS=false
    ROOT_CA=
    MQTT_CERT_FILE=
    MQTT_KEY_FILE=
    MQTT_CLIENT_ID=online-receiver
    {{- if .Values.mosquitto.auth.enable }}
    MQTT_AUTH=true
    MQTT_USER={{ .Values.mosquitto.auth.username }}
    MQTT_PASSWORD={{ .Values.mosquitto.auth.password }}
    {{ else }}
    MQTT_AUTH=false
    MQTT_USER=
    MQTT_PASSWORD=
    {{ end }}
  Rocket.toml: |-
    [default]

    [release]
    address = "0.0.0.0"
    port = 80
    secret_key="{{ .Values.onlineReceiver.rocketSecretKey.release }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-receiver
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: online-receiver
  template:
    metadata:
      labels:
        app: online-receiver
    spec:
      {{- if .Values.serviceAccounts.enabled }}
      serviceAccountName: online-receiver
      automountServiceAccountToken: false
      {{- end }}
      {{- if .Values.dhi.enabled }}
      imagePullSecrets:
        - name: dhi-registry-secret
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.domains.mqtt.ssl.enable }}
      initContainers:
        - name: wait-for-mqtt
          image: {{ if .Values.dhi.enabled }}{{ .Values.alpine.hardenedImage }}{{ else }}{{ .Values.alpine.image }}{{ end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.alpine.resources | nindent 12 }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              until nc -z {{ .Values.mosquitto.serviceName }}.{{ .Values.namespace }}.svc.cluster.local 1883; do
                echo "Waiting for Mosquitto on port 1883..."; sleep 2
              done
      {{- end }}
      containers:
      - name: online-receiver
        image: {{ .Values.onlineReceiver.image }}
        {{- if .Values.debug.pods.alwaysPullContainers }}
        imagePullPolicy: Always
        {{- end }}
        {{- if .Values.debug.pods.sleepInfinity }}
        command: ["/bin/sh"]
        args: ["-c", "chmod +x /app/online; /app/online; sleep Infinity;"]
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"]
        resources:
          {{- toYaml .Values.onlineReceiver.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 30
        livenessProbe:
          httpGet:
            path: /keepalive
            port: http
          periodSeconds: 60
          failureThreshold: 2
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: online-receiver-config
          mountPath: /app/.env
          subPath: .env
          readOnly: true
        - name: online-receiver-config
          mountPath: /app/Rocket.toml
          subPath: Rocket.toml
          readOnly: true
        - name: tmp
          mountPath: /tmp
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: online-receiver-config
        configMap:
          name: online-receiver-config
      - name: tmp
        emptyDir: {}
      - name: logs
        emptyDir: {}